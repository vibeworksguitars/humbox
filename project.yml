name: Humbox
options:
  bundleIdPrefix: com.humbox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AudioKit:
    url: https://github.com/AudioKit/AudioKit
    from: "5.6.0"
  SoundpipeAudioKit:
    url: https://github.com/AudioKit/SoundpipeAudioKit
    from: "5.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Humbox:
    type: application
    platform: iOS
    sources:
      - path: Humbox
    dependencies:
      - package: AudioKit
        product: AudioKit
      - package: SoundpipeAudioKit
        product: SoundpipeAudioKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.humbox.app
        INFOPLIST_FILE: Humbox/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Humbox/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Humbox needs microphone access to capture your musical ideas."
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

  HumboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HumboxTests
    dependencies:
      - target: Humbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.humbox.app.tests
